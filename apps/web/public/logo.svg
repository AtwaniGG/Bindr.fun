<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- 3x3 binder grid icon -->
  <g transform="translate(10, 12)">
    <rect x="0"  y="0"  width="16" height="16" rx="3.5" fill="#B1D235"/>
    <rect x="20" y="0"  width="16" height="16" rx="3.5" fill="#B1D235"/>
    <rect x="40" y="0"  width="16" height="16" rx="3.5" fill="none" stroke="#B1D235" stroke-width="1.5"/>
    <rect x="0"  y="20" width="16" height="16" rx="3.5" fill="#B1D235"/>
    <rect x="20" y="20" width="16" height="16" rx="3.5" fill="#B1D235"/>
    <rect x="40" y="20" width="16" height="16" rx="3.5" fill="#B1D235"/>
    <rect x="0"  y="40" width="16" height="16" rx="3.5" fill="#B1D235"/>
    <rect x="20" y="40" width="16" height="16" rx="3.5" fill="#B1D235"/>
    <rect x="40" y="40" width="16" height="16" rx="3.5" fill="#B1D235"/>
  </g>

  <!-- Bindr.fun wordmark -->
  <text x="80" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" letter-spacing="-2">
    <tspan fill="#F2F4F3">Bindr</tspan><tspan fill="rgba(242,244,243,0.35)">.fun</tspan>
  </text>
</svg>
