<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#2E3A3A"/>

  <!-- 3x3 binder grid centered -->
  <g transform="translate(24, 24)">
    <rect x="0"  y="0"  width="20" height="20" rx="4.5" fill="#B1D235"/>
    <rect x="26" y="0"  width="20" height="20" rx="4.5" fill="#B1D235"/>
    <rect x="52" y="0"  width="20" height="20" rx="4.5" fill="none" stroke="#B1D235" stroke-width="1.8"/>
    <rect x="0"  y="26" width="20" height="20" rx="4.5" fill="#B1D235"/>
    <rect x="26" y="26" width="20" height="20" rx="4.5" fill="#B1D235"/>
    <rect x="52" y="26" width="20" height="20" rx="4.5" fill="#B1D235"/>
    <rect x="0"  y="52" width="20" height="20" rx="4.5" fill="#B1D235"/>
    <rect x="26" y="52" width="20" height="20" rx="4.5" fill="#B1D235"/>
    <rect x="52" y="52" width="20" height="20" rx="4.5" fill="#B1D235"/>
  </g>
</svg>
