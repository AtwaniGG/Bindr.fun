<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="slabG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>

  <!-- Back slab -->
  <g transform="translate(60, 55) rotate(-10)">
    <rect x="-24" y="-35" width="48" height="70" rx="5" fill="url(#slabG)" opacity="0.35" stroke="#64748b" stroke-width="1.2"/>
  </g>

  <!-- Middle slab -->
  <g transform="translate(60, 55) rotate(5)">
    <rect x="-24" y="-35" width="48" height="70" rx="5" fill="url(#slabG)" opacity="0.55" stroke="#64748b" stroke-width="1.2"/>
  </g>

  <!-- Front slab -->
  <g transform="translate(60, 55)">
    <rect x="-24" y="-35" width="48" height="70" rx="5" fill="url(#slabG)" stroke="#475569" stroke-width="1.8"/>

    <!-- Card -->
    <rect x="-17" y="-22" width="34" height="40" rx="2.5" fill="url(#cardG)"/>
    <rect x="-17" y="-22" width="17" height="40" rx="2.5" fill="white" opacity="0.15"/>

    <!-- Star -->
    <polygon points="0,-12 2.5,-5 9,-5 4,-1 5.5,6 0,2.5 -5.5,6 -4,-1 -9,-5 -2.5,-5" fill="white" opacity="0.9"/>

    <!-- Grade label -->
    <rect x="-14" y="22" width="28" height="9" rx="2" fill="#1e293b"/>
    <text x="0" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6.5" font-weight="700" fill="#facc15" letter-spacing="0.4">GEM 10</text>
  </g>

  <!-- "b" letter at bottom -->
  <text x="60" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">bindr</text>
</svg>
